<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRICE INTEL — 상품 경쟁력 분석기</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --border: rgba(255,255,255,0.07);
  --accent: #f0c040;
  --accent2: #4af0a0;
  --accent3: #f05060;
  --accent4: #60a0f8;
  --text: #e8eaf0;
  --muted: #6b7280;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Noto Sans KR', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; }

header {
  border-bottom:1px solid var(--border); padding:18px 40px;
  display:flex; align-items:center; gap:16px;
  background:var(--surface); position:sticky; top:0; z-index:100;
}
.logo-mark {
  width:38px; height:38px; background:var(--accent); border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-size:22px; color:#000;
}
.logo-text { font-family:var(--font-display); font-size:20px; letter-spacing:3px; }
.logo-sub { font-family:var(--font-mono); font-size:10px; color:var(--muted); letter-spacing:2px; margin-top:1px; }
.tag-live { font-family:var(--font-mono); font-size:10px; padding:4px 10px; border-radius:4px; letter-spacing:1px; background:rgba(74,240,160,0.15); color:var(--accent2); border:1px solid rgba(74,240,160,0.3); margin-left:auto; }

main { max-width:1100px; margin:0 auto; padding:36px 24px 80px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 32px; margin-bottom:20px; }
.card-title {
  font-family:var(--font-mono); font-size:10px; letter-spacing:3px;
  color:var(--accent); text-transform:uppercase; margin-bottom:20px;
  display:flex; align-items:center; gap:8px;
}
.card-title::before { content:''; width:3px; height:14px; background:var(--accent); border-radius:2px; }

.input-row { display:grid; grid-template-columns:160px 1fr 140px; gap:12px; align-items:end; }
label { display:block; font-family:var(--font-mono); font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
input[type="text"] {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:12px 16px; color:var(--text);
  font-family:var(--font-mono); font-size:13px; outline:none; transition:border-color 0.2s;
}
input[type="text"]:focus { border-color:var(--accent); }
input[type="text"]::placeholder { color:var(--muted); }

.btn { padding:12px 22px; border-radius:8px; border:none; font-family:var(--font-body); font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#f8d060; transform:translateY(-1px); }
.btn-primary:disabled { background:#3a3520; color:#6b6030; cursor:not-allowed; transform:none; }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }

/* LOADING */
.loading-box {
  text-align:center; padding:50px 20px; display:none;
}
.spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:spin 0.8s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-family:var(--font-mono); font-size:12px; color:var(--accent); letter-spacing:2px; }

/* VERDICT */
.verdict-bar { border-radius:12px; padding:20px 24px; display:flex; align-items:center; gap:16px; margin-bottom:24px; }
.verdict-bar.good { background:rgba(74,240,160,0.08); border:1px solid rgba(74,240,160,0.25); }
.verdict-bar.warn { background:rgba(240,192,64,0.08); border:1px solid rgba(240,192,64,0.25); }
.verdict-bar.bad  { background:rgba(240,80,96,0.08);  border:1px solid rgba(240,80,96,0.25); }
.verdict-icon { font-size:30px; }
.verdict-text h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.verdict-text p  { font-size:13px; color:var(--muted); line-height:1.5; }

/* PRICE CARDS */
.price-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
.price-card { border-radius:14px; padding:20px 22px; position:relative; overflow:hidden; }
.price-card.type-partner { background:linear-gradient(135deg,rgba(240,192,64,0.12),rgba(240,192,64,0.03)); border:2px solid rgba(240,192,64,0.4); }
.price-card.type-market  { background:linear-gradient(135deg,rgba(74,240,160,0.1),rgba(74,240,160,0.03)); border:1px solid rgba(74,240,160,0.3); }
.price-card.type-comp    { background:var(--bg); border:1px solid var(--border); }
.price-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.price-card.type-partner::before { background:var(--accent); }
.price-card.type-market::before  { background:var(--accent2); }
.price-card.type-comp::before    { background:var(--border); }
.pc-badge { position:absolute; top:12px; right:12px; font-family:var(--font-mono); font-size:9px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:1px; }
.type-partner .pc-badge { background:rgba(240,192,64,0.2); color:var(--accent); }
.type-market  .pc-badge { background:rgba(74,240,160,0.2); color:var(--accent2); }
.type-comp    .pc-badge { background:rgba(255,255,255,0.07); color:var(--muted); }
.pc-label { font-family:var(--font-mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.type-partner .pc-label { color:var(--accent); }
.type-market  .pc-label { color:var(--accent2); }
.type-comp    .pc-label { color:var(--muted); }
.pc-source { font-size:13px; font-weight:700; margin-bottom:6px; }
.pc-amount { font-family:var(--font-display); font-size:38px; line-height:1; margin-bottom:4px; }
.type-partner .pc-amount { color:var(--accent); }
.type-market  .pc-amount { color:var(--accent2); }
.type-comp    .pc-amount { color:var(--text); }
.pc-note { font-size:11px; color:var(--muted); margin-top:6px; }
.pc-diff { display:inline-block; margin-top:8px; font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:4px; }
.diff-cheap  { background:rgba(74,240,160,0.15); color:var(--accent2); }
.diff-pricey { background:rgba(240,80,96,0.15); color:var(--accent3); }

/* UPS */
.ups-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.ups-card {
  background:linear-gradient(135deg,rgba(240,192,64,0.08),rgba(240,192,64,0.03));
  border:1px solid rgba(240,192,64,0.25); border-radius:14px; padding:18px 20px;
  position:relative; overflow:hidden; transition:transform 0.2s;
}
.ups-card:hover { transform:translateY(-2px); }
.ups-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
.ups-icon { font-size:24px; margin-bottom:8px; display:block; }
.ups-title { font-weight:700; font-size:13px; color:var(--text); }
.ups-desc { font-size:12px; color:var(--muted); line-height:1.5; margin-top:4px; }

/* RESULTS TABLE */
.result-item {
  display:flex; gap:12px; padding:14px 16px;
  background:var(--bg); border:1px solid var(--border); border-radius:10px;
  margin-bottom:8px; align-items:flex-start;
}
.result-item:hover { border-color:rgba(255,255,255,0.15); }
.result-rank { font-family:var(--font-display); font-size:22px; color:var(--muted); min-width:30px; }
.result-info { flex:1; }
.result-title { font-size:13px; font-weight:700; margin-bottom:4px; line-height:1.4; }
.result-title a { color:var(--text); text-decoration:none; }
.result-title a:hover { color:var(--accent); }
.result-meta { font-size:11px; color:var(--muted); display:flex; gap:12px; flex-wrap:wrap; }
.result-price { font-family:var(--font-display); font-size:24px; color:var(--accent2); min-width:120px; text-align:right; }
.result-mall { font-size:11px; color:var(--muted); text-align:right; }

/* HISTORY */
.history-item {
  display:flex; align-items:center; gap:12px; padding:10px 16px;
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  margin-bottom:6px; cursor:pointer; transition:border-color 0.2s; font-size:13px;
}
.history-item:hover { border-color:var(--accent); }
.history-code { font-family:var(--font-mono); font-size:11px; color:var(--accent); min-width:80px; }
.history-date { font-family:var(--font-mono); font-size:10px; color:var(--muted); }

.empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-icon { font-size:44px; margin-bottom:14px; opacity:0.4; display:block; }

.toast { position:fixed; bottom:24px; right:24px; background:var(--accent2); color:#000; padding:12px 20px; border-radius:8px; font-weight:700; font-size:13px; transform:translateY(80px); opacity:0; transition:all 0.3s; z-index:1000; }
.toast.show { transform:translateY(0); opacity:1; }

.error-box { background:rgba(240,80,96,0.08); border:1px solid rgba(240,80,96,0.3); border-radius:10px; padding:16px 20px; color:var(--accent3); font-size:13px; margin-bottom:16px; display:none; }

@media (max-width:700px) {
  header { padding:14px 16px; }
  main { padding:20px 14px 60px; }
  .input-row { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="logo-mark">P</div>
  <div>
    <div class="logo-text">PRICE INTEL</div>
    <div class="logo-sub">상품 경쟁력 분석 시스템</div>
  </div>
  <span class="tag-live">● LIVE</span>
</header>

<main>

  <!-- 입력 -->
  <div class="card">
    <div class="card-title">상품 검색</div>
    <div class="input-row">
      <div>
        <label>상품 코드</label>
        <input type="text" id="product-code" placeholder="APP1000" />
      </div>
      <div>
        <label>상품명 (필수)</label>
        <input type="text" id="product-name" placeholder="보라카이 파라다이스가든 3박4일 식사6회" onkeydown="if(event.key==='Enter') search()" />
      </div>
      <div>
        <label>파트너사</label>
        <input type="text" id="partner" placeholder="노랑풍선" />
      </div>
    </div>
    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" id="search-btn" onclick="search()">🔍 가격 분석 시작</button>
      <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
    </div>
  </div>

  <!-- 로딩 -->
  <div class="loading-box" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">네이버 쇼핑 검색 중...</div>
  </div>

  <!-- 에러 -->
  <div class="error-box" id="error-box"></div>

  <!-- 결과 대시보드 -->
  <div id="dashboard" style="display:none">

    <div class="card">
      <!-- 헤더 -->
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px; flex-wrap:wrap; gap:12px;">
        <div>
          <div style="font-family:var(--font-mono); font-size:10px; color:var(--accent); letter-spacing:2px; margin-bottom:4px;" id="out-code"></div>
          <h2 style="font-size:20px; font-weight:900;" id="out-name"></h2>
          <div style="font-size:12px; color:var(--muted); margin-top:4px;" id="out-meta"></div>
        </div>
        <button class="btn btn-secondary" onclick="clearAll()" style="font-size:12px; padding:8px 16px;">+ 새 분석</button>
      </div>

      <!-- 경쟁력 판정 -->
      <div class="verdict-bar" id="verdict-bar">
        <div class="verdict-icon" id="verdict-icon">🔍</div>
        <div class="verdict-text">
          <h3 id="verdict-title"></h3>
          <p id="verdict-desc"></p>
        </div>
      </div>

      <!-- 가격 카드 -->
      <div class="card-title">💰 가격 비교</div>
      <div class="price-grid" id="price-grid"></div>

      <!-- 특전혜택 -->
      <div id="ups-section" style="display:none; margin-bottom:24px;">
        <div class="card-title">⭐ 이 상품의 특전 혜택</div>
        <div class="ups-grid" id="ups-grid"></div>
      </div>

      <!-- 네이버 검색 결과 -->
      <div id="naver-section" style="display:none;">
        <div class="card-title">🛒 네이버 쇼핑 검색 결과</div>
        <div id="naver-results"></div>
      </div>

    </div>
  </div>

  <!-- 이력 -->
  <div class="card" id="card-history">
    <div class="card-title">최근 분석 이력</div>
    <div id="history-list">
      <div class="empty-state">
        <span class="empty-icon">📋</span>
        <p>아직 분석 이력이 없습니다.<br>상품명을 입력해서 분석을 시작해보세요.</p>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const CLIENT_ID     = 'GZeeURHXNPoK0BSUfoq0';
const CLIENT_SECRET = 'Vn_V2s1Meo';
const WORKER_URL = 'https://lucky-sunset-f6d4.danbi-lee2.workers.dev';

let historyData = JSON.parse(localStorage.getItem('price_intel_v3') || '[]');

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setLoading(show, msg) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
  if (msg) document.getElementById('loading-text').textContent = msg;
  document.getElementById('search-btn').disabled = show;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-box').style.display = 'none';
}

async function naverSearch(query, display = 5) {
  const url = `${WORKER_URL}?query=${encodeURIComponent(query)}&display=${display}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('검색 실패 (' + res.status + ')');
  return await res.json();
}

function cleanTitle(html) {
  return html.replace(/<[^>]+>/g, '');
}

function formatPrice(p) {
  return parseInt(p).toLocaleString() + '원';
}

async function search() {
  const code    = document.getElementById('product-code').value.trim();
  const name    = document.getElementById('product-name').value.trim();
  const partner = document.getElementById('partner').value.trim() || '파트너사';

  if (!name) { showError('상품명을 입력해주세요.'); return; }

  hideError();
  document.getElementById('dashboard').style.display = 'none';
  setLoading(true, '🔍 네이버 쇼핑 검색 중...');

  try {
    // 1. 파트너사 상품 검색
    setLoading(true, `🏪 ${partner} 상품 검색 중...`);
    const partnerQuery = partner + ' ' + name;
    const partnerData  = await naverSearch(partnerQuery, 5);

    // 2. 일반 시장 최저가 검색
    setLoading(true, '💰 시장 최저가 검색 중...');
    const marketData = await naverSearch(name, 10);

    setLoading(true, '📊 분석 결과 정리 중...');

    // 파트너사 상품 필터
    const partnerItems = (partnerData.items || []).filter(i =>
      i.mallName && i.mallName.includes(partner.slice(0,2))
    );

    // 전체 결과 중 최저가
    const allItems = (marketData.items || []).sort((a,b) => parseInt(a.lprice) - parseInt(b.lprice));
    const lowestItem = allItems[0];
    const lowestPrice = lowestItem ? parseInt(lowestItem.lprice) : 0;

    // 파트너사 최저가
    const partnerLowest = partnerItems.length > 0
      ? Math.min(...partnerItems.map(i => parseInt(i.lprice)))
      : 0;

    // 렌더링
    renderDashboard({ code, name, partner, partnerItems, allItems, partnerLowest, lowestPrice, lowestItem });

    // 이력 저장
    saveHistory({ code, name, partner, partnerLowest, lowestPrice });

    setLoading(false);
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dashboard').scrollIntoView({ behavior:'smooth' });

  } catch(e) {
    setLoading(false);
    showError(e.message || '검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  }
}

function renderDashboard({ code, name, partner, partnerItems, allItems, partnerLowest, lowestPrice, lowestItem }) {
  // 헤더
  document.getElementById('out-code').textContent = code ? '상품코드: ' + code : '';
  document.getElementById('out-name').textContent = name;
  document.getElementById('out-meta').textContent = '파트너사: ' + partner + ' · 분석일: ' + new Date().toLocaleString('ko-KR');

  // 경쟁력 판정
  const vBar  = document.getElementById('verdict-bar');
  const vIcon = document.getElementById('verdict-icon');
  const vTitle= document.getElementById('verdict-title');
  const vDesc = document.getElementById('verdict-desc');

  if (partnerLowest > 0 && lowestPrice > 0) {
    const diff = partnerLowest - lowestPrice;
    const pct  = Math.round(Math.abs(diff) / lowestPrice * 100);
    if (diff <= 0) {
      vBar.className = 'verdict-bar good'; vIcon.textContent = '✅';
      vTitle.textContent = '가격 경쟁력 있음';
      vDesc.textContent = `${partner} 가격(${formatPrice(partnerLowest)})이 시장 최저가(${formatPrice(lowestPrice)}) 대비 경쟁력 있습니다.`;
    } else {
      vBar.className = 'verdict-bar bad'; vIcon.textContent = '⚠️';
      vTitle.textContent = '가격 재협의 검토 필요';
      vDesc.textContent = `${partner} 가격(${formatPrice(partnerLowest)})이 시장 최저가(${formatPrice(lowestPrice)})보다 ${pct}% 높습니다. 포함 혜택과 함께 종합 판단하세요.`;
    }
  } else {
    vBar.className = 'verdict-bar warn'; vIcon.textContent = '🔍';
    vTitle.textContent = '파트너사 상품 직접 확인 필요';
    vDesc.textContent = '네이버에서 파트너사 판매 상품을 찾지 못했습니다. 아래 검색 결과를 참고하세요.';
  }

  // 가격 카드
  const grid = document.getElementById('price-grid');
  const cards = [];

  if (partnerLowest > 0) {
    const diff = lowestPrice > 0 ? partnerLowest - lowestPrice : 0;
    const diffHtml = diff < 0
      ? `<span class="pc-diff diff-cheap">최저가 대비 ${formatPrice(Math.abs(diff))} 저렴</span>`
      : diff > 0
      ? `<span class="pc-diff diff-pricey">최저가 대비 ${formatPrice(diff)} 높음</span>`
      : `<span class="pc-diff diff-cheap">최저가와 동일</span>`;
    cards.push(`
      <div class="price-card type-partner">
        <span class="pc-badge">PARTNER</span>
        <div class="pc-label">파트너사 최저가</div>
        <div class="pc-source">${partner}</div>
        <div class="pc-amount">${formatPrice(partnerLowest)}</div>
        ${diffHtml}
      </div>`);
  }

  if (lowestItem) {
    cards.push(`
      <div class="price-card type-market">
        <span class="pc-badge">LOWEST</span>
        <div class="pc-label">네이버 최저가</div>
        <div class="pc-source">${lowestItem.mallName}</div>
        <div class="pc-amount">${formatPrice(lowestPrice)}</div>
        <div class="pc-note">${cleanTitle(lowestItem.title).slice(0,30)}...</div>
      </div>`);
  }

  // 경쟁사 2~3개
  const comps = allItems.filter(i => i.mallName !== lowestItem?.mallName).slice(0,3);
  comps.forEach(item => {
    const p = parseInt(item.lprice);
    const diff = partnerLowest > 0 ? p - partnerLowest : 0;
    const diffNote = diff > 0
      ? `<div class="pc-note" style="color:var(--accent2)">파트너사 대비 ${formatPrice(diff)} 높음</div>`
      : diff < 0
      ? `<div class="pc-note" style="color:var(--accent3)">파트너사 대비 ${formatPrice(Math.abs(diff))} 낮음</div>`
      : '';
    cards.push(`
      <div class="price-card type-comp">
        <span class="pc-badge">COMP</span>
        <div class="pc-label">경쟁사</div>
        <div class="pc-source">${item.mallName}</div>
        <div class="pc-amount">${formatPrice(p)}</div>
        ${diffNote}
      </div>`);
  });

  grid.innerHTML = cards.join('');

  // 네이버 검색 결과 목록
  if (allItems.length > 0) {
    document.getElementById('naver-section').style.display = 'block';
    document.getElementById('naver-results').innerHTML = allItems.slice(0,8).map((item, i) => `
      <div class="result-item">
        <div class="result-rank">${i+1}</div>
        <div class="result-info">
          <div class="result-title"><a href="${item.link}" target="_blank">${cleanTitle(item.title)}</a></div>
          <div class="result-meta">
            <span>🏪 ${item.mallName}</span>
            ${item.brand ? `<span>브랜드: ${item.brand}</span>` : ''}
            ${item.category3 ? `<span>${item.category3}</span>` : ''}
          </div>
        </div>
        <div>
          <div class="result-price">${formatPrice(item.lprice)}</div>
          <div class="result-mall"><a href="${item.link}" target="_blank" style="color:var(--accent); font-size:11px;">→ 보기</a></div>
        </div>
      </div>
    `).join('');
  }
}

function saveHistory(entry) {
  entry.date = new Date().toLocaleString('ko-KR');
  historyData.unshift(entry);
  if (historyData.length > 30) historyData = historyData.slice(0,30);
  localStorage.setItem('price_intel_v3', JSON.stringify(historyData));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!historyData.length) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">📋</span><p>아직 분석 이력이 없습니다.</p></div>`;
    return;
  }
  list.innerHTML = historyData.map(h => `
    <div class="history-item" onclick="loadHistory('${h.code}','${h.name}','${h.partner}')">
      <div class="history-code">${h.code || '—'}</div>
      <div style="flex:1;">${h.name}</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--accent2);">${h.partnerLowest ? formatPrice(h.partnerLowest) : '—'}</div>
      <div class="history-date">${h.date}</div>
    </div>
  `).join('');
}

function loadHistory(code, name, partner) {
  document.getElementById('product-code').value = code;
  document.getElementById('product-name').value = name;
  document.getElementById('partner').value = partner;
  search();
}

function clearAll() {
  document.getElementById('product-code').value = '';
  document.getElementById('product-name').value = '';
  document.getElementById('partner').value = '';
  document.getElementById('dashboard').style.display = 'none';
  hideError();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function formatPrice(n) {
  return parseInt(n).toLocaleString() + '원';
}

renderHistory();
</script>
</body>
</html>
